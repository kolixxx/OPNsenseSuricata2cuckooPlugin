<!-- Managed by OPNsense Suricata2Cuckoo plugin. -->
<cuckoomx>
  <filestore>
    <path>{{ OPNsense.suricata2cuckoo.general.FilestorePath }}</path>
    <watch-method>{{ OPNsense.suricata2cuckoo.general.WatchMethod }}</watch-method>
    <poll-interval>{{ OPNsense.suricata2cuckoo.general.PollInterval }}</poll-interval>
    <file-settle-time>{{ OPNsense.suricata2cuckoo.general.FileSettleTime }}</file-settle-time>
  </filestore>
  <cuckoo>
    <api-url>{{ OPNsense.suricata2cuckoo.general.CuckooApiUrl }}</api-url>
    <api-token>{{ OPNsense.suricata2cuckoo.general.CuckooApiToken }}</api-token>
    <guest>{{ OPNsense.suricata2cuckoo.general.CuckooGuest }}</guest>
  </cuckoo>
</cuckoomx>

